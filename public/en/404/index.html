<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 - Page Not Found | IBB Shuttle Service</title>
  <link rel="icon" type="image/png" href="/favicon-ibb.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .container{text-align:center;padding:2rem;max-width:480px}
    .logo{margin-bottom:2rem}
    .logo img{height:48px}
    h1{font-size:6rem;font-weight:700;color:#d4a84b;margin-bottom:0.5rem;line-height:1}
    .subtitle{font-size:1.5rem;color:#ccc;margin-bottom:0.5rem}
    .message{font-size:1rem;color:#888;margin-bottom:2rem;line-height:1.6}
    .btn{display:inline-block;padding:0.75rem 2rem;background:#d4a84b;color:#0a0a0a;text-decoration:none;border-radius:8px;font-weight:600;transition:opacity 0.2s;font-size:1rem}
    .btn:hover{opacity:0.85}
    [dir="rtl"] .container{direction:rtl}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/favicon-ibb.png" alt="IBB Shuttle Service" width="48" height="48">
    </div>
    <h1>404</h1>
    <p class="subtitle">Page Not Found</p>
    <p class="message">The page you are looking for does not exist or has been moved.</p>
    <a class="btn" href="/en/">Return to Home</a>
  </div>
</body>
</html>
